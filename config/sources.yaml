    rss: "https://apologetics315.com/feed"


# source_type: article | podcast | publication | journal
# Entries with scrape: true use BeautifulSoup on the URL.
# Entries with rss: use feedparser.
# Entries marked monitor_only have no auto-fetch — track manually.

