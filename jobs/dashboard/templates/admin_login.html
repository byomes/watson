<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Watson Admin — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0f0f0f;
  --surface: #1a1a1a;
  --border:  #2a2a2a;
  --gold:    #c9a84c;
  --muted:   #666;
  --text:    #e8e8e8;
  --red:     #c9504c;
  --r-card:  12px;
  --r-btn:   6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.login-wrap {
  width: 100%;
  max-width: 360px;
}
.login-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
  justify-content: center;
}
.login-mark {
  width: 42px; height: 42px;
  background: #111827;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: Georgia, serif;
  font-size: 26px; font-weight: 700;
  color: #fff; line-height: 1;
}
.login-brand {
  display: flex;
  flex-direction: column;
}
.login-brand-name {
  font-size: 16px; font-weight: 700;
  color: var(--gold); letter-spacing: .06em;
}
.login-brand-sub {
  font-size: 11px; color: var(--muted);
  font-family: 'DM Mono', monospace;
  letter-spacing: .04em;
  margin-top: 1px;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: 28px 24px;
}
.login-title {
  font-size: 15px; font-weight: 600;
  color: var(--text);
  margin-bottom: 20px;
  text-align: center;
}
.login-field {
  margin-bottom: 12px;
}
.login-field label {
  display: block;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  margin-bottom: 6px;
}
.login-field input {
  display: block;
  width: 100%;
  background: #111;
  border: 1px solid var(--border);
  border-radius: var(--r-btn);
  padding: 11px 13px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
}
.login-field input:focus { border-color: var(--gold); }
.login-field input::placeholder { color: var(--muted); }
.login-error {
  font-size: 12px;
  color: var(--red);
  margin-bottom: 12px;
  text-align: center;
  min-height: 18px;
}
.login-btn {
  display: block;
  width: 100%;
  padding: 12px;
  background: var(--gold);
  border: none;
  border-radius: var(--r-btn);
  color: #0f0f0f;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  margin-top: 20px;
  letter-spacing: .02em;
  transition: opacity .15s;
}
.login-btn:hover { opacity: .85; }
.login-btn:active { opacity: .7; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="login-mark">W</div>
    <div class="login-brand">
      <div class="login-brand-name">WATSON</div>
      <div class="login-brand-sub">Team Admin</div>
    </div>
  </div>
  <div class="login-card">
    <div class="login-title">Sign in</div>
    <form method="POST" action="/admin/login">
      <div class="login-error">{{ error or '' }}</div>
      <div class="login-field">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" autofocus placeholder="donna">
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="login-btn">Sign in</button>
    </form>
  </div>
</div>
</body>
</html>
