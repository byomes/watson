<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Watson">
<meta name="theme-color" content="#0f0f0f">
<title>Watson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ───────────────────────────────────────────────────────── */
:root {
  --bg:       #0f0f0f;
  --surface:  #1a1a1a;
  --border:   #2a2a2a;
  --gold:     #c9a84c;
  --gold-dim: #8a6f2e;
  --muted:    #666;
  --green:    #4caf7d;
  --red:      #c9504c;
  --blue:     #4c7ec9;
  --text:     #e8e8e8;
  --r-card:   12px;
  --r-btn:    6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', -apple-system, sans-serif;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* ── Header ─────────────────────────────────────────────────────────────── */
#hdr {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  padding-top: calc(10px + env(safe-area-inset-top));
  height: calc(57px + env(safe-area-inset-top));
}

#hdr-mark {
  width: 36px; height: 36px;
  background: #111827;
  border-radius: 8px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: Georgia, serif;
  font-size: 22px; font-weight: 700;
  color: #ffffff; line-height: 1;
}

#hdr-text { flex: 1; min-width: 0; }
#hdr-title { font-size: 14px; font-weight: 600; color: var(--gold); letter-spacing: .05em; }
#hdr-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
#hdr-date { font-size: 11px; color: var(--muted); flex-shrink: 0; text-align: right; white-space: nowrap; }

/* ── Scrollable page area ────────────────────────────────────────────────── */
#page-content {
  position: fixed;
  top: calc(57px + env(safe-area-inset-top)); left: 0; right: 0;
  bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
  padding-bottom: calc(60px + env(safe-area-inset-bottom));
}

/* Extra bottom padding on tasks page for sticky add bar */
#page-content.has-add-bar {
  padding-bottom: 68px;
}

/* ── Add-task bar (tasks page only) ─────────────────────────────────────── */
#add-task-bar {
  display: none;
  position: fixed;
  left: 0; right: 0;
  bottom: calc(52px + env(safe-area-inset-bottom));
  z-index: 90;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  gap: 8px;
  align-items: center;
}
#add-task-bar.visible { display: flex; }

#add-task-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-btn);
  padding: 9px 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  min-width: 0;
}
#add-task-input:focus { border-color: var(--gold); }
#add-task-input::placeholder { color: var(--muted); }

#add-task-btn {
  background: var(--gold);
  color: #0f0f0f;
  border: none;
  border-radius: var(--r-btn);
  padding: 9px 18px;
  font-weight: 600;
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
#add-task-btn:active { opacity: .8; }

/* ── Bottom nav ──────────────────────────────────────────────────────────── */
#nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding-bottom: 34px;
  margin-bottom: 0;
  background: #0f0f0f;
  padding-top: 8px;
  height: auto;
  background: #0f0f0f;
  border-top: 1px solid #2a2a2a;
  display: flex;
  align-items: center;
  justify-content: space-around;
}
.nb {
  flex: 1;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  font-family: inherit;
  color: var(--muted);
  transition: color .15s;
  -webkit-tap-highlight-color: transparent;
}
.nb .ni { display: flex; align-items: center; justify-content: center; }
.nb .nl { font-size: 10px; letter-spacing: .03em; }
.nb.active { color: var(--gold); }

/* ── Section labels ──────────────────────────────────────────────────────── */
.sec-label {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  letter-spacing: .1em;
  color: var(--muted);
  text-transform: uppercase;
  margin: 20px 0 8px;
}
.sec-label:first-child { margin-top: 0; }

/* ── Base card ───────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: 14px;
  margin-bottom: 8px;
}
.card-title { font-size: 14px; font-weight: 500; line-height: 1.4; }
.card-sub   { font-size: 12px; color: var(--muted); margin-top: 3px; }

/* ── Type badges (pending) ───────────────────────────────────────────────── */
.badge {
  display: inline-block;
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  padding: 2px 7px;
  border-radius: 4px;
  margin-top: 6px;
  font-weight: 500;
  letter-spacing: .04em;
}
.badge-EMAIL    { background: rgba(201,168,76,.12);  color: var(--gold);  border: 1px solid rgba(201,168,76,.3); }
.badge-NOTE     { background: rgba(76,126,201,.12);  color: var(--blue);  border: 1px solid rgba(76,126,201,.3); }
.badge-CALENDAR { background: rgba(76,175,125,.12);  color: var(--green); border: 1px solid rgba(76,175,125,.3); }

/* ── Stats row ───────────────────────────────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: 14px 10px;
  text-align: center;
}
.stat-num { font-size: 30px; font-weight: 600; color: var(--gold); line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── Task / reminder cards ───────────────────────────────────────────────── */
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: 12px 14px;
  margin-bottom: 6px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.task-check {
  width: 18px; height: 18px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.task-check:hover { border-color: var(--gold); }
.task-check.is-done {
  background: var(--green);
  border-color: var(--green);
}
.task-check.is-done::after {
  content: '';
  position: absolute;
  left: 4px; top: 2px;
  width: 7px; height: 4px;
  border-left: 2px solid #fff;
  border-bottom: 2px solid #fff;
  transform: rotate(-45deg);
}
.task-check.display-only { cursor: default; }
.task-body  { flex: 1; min-width: 0; }
.task-title { font-size: 14px; line-height: 1.4; }
.task-title.struck { color: var(--muted); text-decoration: line-through; }

.pri {
  display: inline-block;
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  padding: 2px 6px;
  border-radius: 4px;
  margin-top: 5px;
  letter-spacing: .02em;
}
.pri-high   { background: rgba(201,80,76,.12);  color: var(--red); }
.pri-medium { background: rgba(201,168,76,.10); color: var(--gold-dim); }
.pri-low    { background: rgba(76,175,125,.10); color: var(--green); }
.pri-normal { background: rgba(102,102,102,.10);color: var(--muted); }

/* ── Calendar grouped card ───────────────────────────────────────────────── */
.cal-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  overflow: hidden;
  margin-bottom: 8px;
}
.cal-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.cal-row:last-child { border-bottom: none; }
.cal-time  { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); flex-shrink: 0; width: 62px; }
.cal-event { font-size: 14px; font-weight: 500; flex: 1; }

/* ── Briefing ────────────────────────────────────────────────────────────── */
.b-hdr {
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.b-hdr-title { font-size: 22px; font-weight: 600; color: var(--gold); letter-spacing: .06em; }
.b-hdr-date  { font-size: 12px; color: var(--muted); margin-top: 4px; }
.b-hdr-gen   { font-size: 11px; color: var(--muted); opacity: .6; margin-top: 2px; font-family: 'DM Mono', monospace; }

.b-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: 14px;
  margin-bottom: 10px;
}
.b-source  { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
.b-title   { font-size: 14px; font-weight: 500; line-height: 1.4; margin-bottom: 10px; }
.b-actions { display: flex; flex-wrap: wrap; gap: 6px; }

.b-btn {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: var(--r-btn);
  border: 1px solid var(--border);
  background: none;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  transition: opacity .15s;
}
.b-btn:active { opacity: .7; }
.b-btn-read   { border-color: var(--gold); color: var(--gold); }
.b-btn-reject { border-color: var(--red);  color: var(--red);  }
.b-btn.sent   { opacity: .4; pointer-events: none; }

/* ── Reading list card ────────────────────────────────────────────────────── */
.rl-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: 14px;
  margin-bottom: 8px;
}
.rl-source { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
.rl-title  { font-size: 14px; font-weight: 500; line-height: 1.4; }
.rl-status { font-size: 10px; font-family: 'DM Mono', monospace; margin-top: 6px; }
.rl-unread  { color: var(--muted); }
.rl-reading { color: var(--gold); }
.rl-finished{ color: var(--green); }

/* ── View-all link ───────────────────────────────────────────────────────── */
.view-all {
  display: block;
  text-align: center;
  padding: 10px;
  font-size: 12px;
  color: var(--gold);
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  letter-spacing: .04em;
  -webkit-tap-highlight-color: transparent;
}

/* ── Empty / loading states ──────────────────────────────────────────────── */
.empty   { text-align: center; color: var(--muted); font-size: 13px; padding: 24px 0; }
.loading { text-align: center; color: var(--muted); font-size: 12px; padding: 20px 0; font-family: 'DM Mono', monospace; }

/* ── Light theme ─────────────────────────────────────────────────────────── */
[data-theme="light"] {
  --bg: #f5f5f5; --surface: #ffffff; --border: #e0e0e0;
  --gold: #b07c20; --gold-dim: #8a6020; --muted: #888; --text: #1a1a1a;
}

/* ── More page — collapsible sections ────────────────────────────────────── */
.msec { border: 1px solid var(--border); border-radius: var(--r-card); margin-bottom: 10px; overflow: hidden; }
.msec-hdr { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface); cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
.msec-title { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: .1em; text-transform: uppercase; font-weight: 600; }
.msec-chev { color: var(--gold); font-size: 15px; }
.msec-body { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
.msec-body.open { max-height: 9999px; }
.msec-inner { padding: 12px 14px 16px; }
.mlabel { font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; margin: 16px 0 8px; }
.mlabel:first-child { margin-top: 0; }
.mbtn { display: block; width: 100%; padding: 9px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-btn); color: var(--text); font-family: inherit; font-size: 13px; cursor: pointer; text-align: center; margin-bottom: 8px; -webkit-tap-highlight-color: transparent; transition: opacity .15s; }
.mbtn:active { opacity: .7; }
.mbtn-p { background: var(--gold); color: #0f0f0f; border-color: var(--gold); font-weight: 600; }
.mbtn-d { border-color: var(--red); color: var(--red); background: none; }
.mbtn-sm { display: inline-block; width: auto; padding: 5px 10px; font-size: 11px; margin-bottom: 0; }
.mform { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-card); padding: 12px; margin-bottom: 10px; }
.mform input, .mform textarea { display: block; width: 100%; margin-bottom: 8px; padding: 8px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-btn); color: var(--text); font-family: inherit; font-size: 13px; outline: none; }
.mform input:focus, .mform textarea:focus { border-color: var(--gold); }
.mfrow { display: flex; gap: 8px; }
.mfrow .mbtn { margin-bottom: 0; }
.mcc { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-card); margin-bottom: 6px; overflow: hidden; }
.mcc-hdr { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.mcc-av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.mcc-info { flex: 1; min-width: 0; }
.mcc-name { font-size: 13px; font-weight: 500; }
.mcc-sub { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mcc-body { padding: 0 12px 12px; display: none; }
.mcc-body.open { display: block; }
.mcc-field { display: block; width: 100%; margin-bottom: 6px; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-btn); color: var(--text); font-family: inherit; font-size: 13px; outline: none; }
.mcc-field:focus { border-color: var(--gold); }
.mtabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
.mtab { flex: 1; padding: 8px 0; background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px; font-size: 11px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: .06em; cursor: pointer; color: var(--muted); }
.mtab.active { color: var(--gold); border-bottom-color: var(--gold); }
.mpn-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-card); padding: 12px; margin-bottom: 6px; }
.msk-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-card); padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
.msk-info { flex: 1; min-width: 0; }
.msk-name { font-size: 13px; font-weight: 500; }
.msk-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
.msk-badge { font-size: 9px; font-family: 'DM Mono', monospace; padding: 2px 6px; border-radius: 3px; background: rgba(201,168,76,.1); color: var(--gold); border: 1px solid rgba(201,168,76,.2); display: inline-block; margin-top: 3px; }
.msk-trigger { display: inline-flex; align-items: center; font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); color: var(--muted); background: transparent; cursor: pointer; font-family: inherit; line-height: 1.3; }
.term-chip { display: inline-flex; align-items: center; font-size: 12px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); color: var(--text); background: var(--surface); cursor: pointer; font-family: 'DM Mono', monospace; line-height: 1.3; -webkit-tap-highlight-color: transparent; }
.msrch { display: block; width: 100%; padding: 9px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-btn); color: var(--text); font-family: inherit; font-size: 13px; outline: none; margin-bottom: 8px; }
.msrch:focus { border-color: var(--gold); }
.mpills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.mpill { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: 11px; font-family: 'DM Mono', monospace; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.mpill.active { background: rgba(201,168,76,.12); border-color: var(--gold); color: var(--gold); }
.mtheme-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
.mswitch { position: relative; width: 44px; height: 26px; display: inline-block; }
.mswitch input { opacity: 0; width: 0; height: 0; }
.mswitch-track { position: absolute; inset: 0; background: var(--border); border-radius: 13px; cursor: pointer; transition: background .2s; }
.mswitch-thumb { position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: #fff; border-radius: 50%; pointer-events: none; transition: transform .2s; }
.mswitch input:checked ~ .mswitch-track { background: var(--gold); }
.mswitch input:checked ~ .mswitch-thumb { transform: translateX(18px); }
.mrrow { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-card); margin-bottom: 6px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.mrrow:active { opacity: .7; }
.mreport-result { margin-top: 6px; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-card); font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
.mshep-wrap { overflow-x: auto; margin-top: 8px; }
.mshep-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.mshep-table th { padding: 6px 8px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
.mshep-table td { padding: 8px; border-bottom: 1px solid var(--border); font-size: 12px; vertical-align: middle; }
.mshep-table tr:last-child td { border-bottom: none; }
.bsoverlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.bsheet { background: var(--surface); border-radius: 16px 16px 0 0; padding: 24px 16px; width: 100%; max-width: 480px; padding-bottom: max(24px,env(safe-area-inset-bottom)); }
.bsheet-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
.bsheet-presets { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.bpreset { padding: 8px 16px; border-radius: var(--r-btn); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; }
.bpreset.sel { background: var(--gold); color: #0f0f0f; border-color: var(--gold); font-weight: 600; }
.maudit-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-card); padding: 12px; margin-bottom: 8px; }

/* ── Desktop fix: add-task bar above footer nav ──────────────────────────── */
/* On iPhone the nav's hardcoded padding-bottom: 34px is offset by
   env(safe-area-inset-bottom) ~34px in the bar's bottom calc, so the bar
   clears the nav (~90px tall). On desktop env()=0 so the bar ends up at
   52px — hidden behind the 90px nav. Raise it for wider viewports. */
@media (min-width: 768px) {
  #add-task-bar {
    bottom: 92px;
  }
  #page-content.has-add-bar {
    padding-bottom: 160px;
  }
}

/* ── Chat overlay ────────────────────────────────────────────────────────── */
#tab-chat {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 50;
  display: none;
  flex-direction: column;
  background: var(--bg);
}
#tab-chat.active { display: flex; }
#tab-chat.active ~ #nav, body.chat-active #nav { display: none; }
#tab-chat #chat-input-bar { position: sticky; bottom: env(safe-area-inset-bottom, 0px); }
#chat-topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
#chat-back-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  color: var(--gold);
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
#chat-back-btn:active { opacity: 0.6; }
#chat-topbar-label {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
#chat-messages {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 14px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#chat-input-bar {
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 10px 12px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  border-top: 1px solid var(--border);
  background: var(--bg);
}
#chat-textarea {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 10px 14px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  line-height: 1.5;
  resize: none;
  outline: none;
  overflow-y: auto;
  min-height: 40px;
  max-height: 120px;
  box-sizing: border-box;
  display: block;
}
#chat-textarea:focus { border-color: var(--gold); }
#chat-textarea::placeholder { color: var(--muted); }
#chat-send-btn {
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--gold);
  color: #0f0f0f;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
#chat-send-btn:active { opacity: 0.8; }
.cmsg { display: flex; flex-direction: column; margin-bottom: 2px; }
.cmsg-user   { align-items: flex-end; }
.cmsg-watson { align-items: flex-start; }
.cmsg-bubble {
  max-width: 85%;
  padding: 9px 13px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
}
.cmsg-user   .cmsg-bubble { background: var(--gold); color: #0f0f0f; border-bottom-right-radius: 4px; }
.cmsg-watson .cmsg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.cstatus {
  font-size: 11px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-style: italic;
  padding: 2px 0;
  align-self: flex-start;
}

/* ── Logins overlay ───────────────────────────────────────────────────────── */
#logins-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: none;
  flex-direction: column;
  background: var(--bg);
}
#logins-overlay.active { display: flex; }
#logins-topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
#logins-back-btn, #logins-add-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  color: var(--gold);
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
#logins-back-btn:active, #logins-add-btn:active { opacity: 0.6; }
#logins-topbar-label {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
#logins-body {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 14px 16px 20px;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: 12px 14px;
  margin-bottom: 8px;
}
.login-label { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.login-meta  { font-size: 12px; color: var(--muted); margin-bottom: 2px; font-family: 'DM Mono', monospace; }
.login-row   { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.login-pwd   { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); flex: 1; word-break: break-all; }
.login-reveal-btn {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: none;
  color: var(--muted);
  cursor: pointer;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.login-reveal-btn:active { opacity: .7; }
.login-del-btn {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--red);
  background: none;
  color: var(--red);
  cursor: pointer;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.login-del-btn:active { opacity: .7; }
#logins-add-panel {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: 14px;
  margin-bottom: 12px;
}
#logins-add-panel.open { display: block; }
#logins-add-panel input, #logins-add-panel textarea {
  display: block; width: 100%; margin-bottom: 8px;
  padding: 8px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-btn);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  outline: none;
}
#logins-add-panel input:focus, #logins-add-panel textarea:focus { border-color: var(--gold); }
#logins-add-panel input::placeholder, #logins-add-panel textarea::placeholder { color: var(--muted); }
.logins-form-row { display: flex; gap: 8px; }
.logins-form-row .mbtn { margin-bottom: 0; }
.logins-locked-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 24px; text-align: center; gap: 12px;
}
.logins-locked-icon { font-size: 48px; }
.logins-locked-msg  { font-size: 14px; color: var(--muted); line-height: 1.5; }
.logins-challenge-screen {
  padding: 32px 16px; display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.logins-challenge-label {
  font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted);
}
.logins-challenge-word {
  font-size: 32px; font-weight: 700; color: var(--gold); letter-spacing: .06em;
}
.logins-challenge-input {
  width: 100%; max-width: 320px; padding: 10px 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-btn); color: var(--text); font-family: inherit;
  font-size: 16px; outline: none; text-align: center;
}
.logins-challenge-input:focus { border-color: var(--gold); }
.logins-challenge-err { font-size: 12px; color: var(--red); min-height: 16px; text-align: center; }
.logins-challenge-btns { display: flex; gap: 10px; width: 100%; max-width: 320px; }
.logins-challenge-btns .mbtn { flex: 1; margin-bottom: 0; }
</style>
</head>
<body>

<header id="hdr">
  <div id="hdr-mark">W</div>
  <div id="hdr-text">
    <div id="hdr-title">WATSON</div>
    <div id="hdr-sub">Digital Assistant</div>
  </div>
  <a href="https://t.me/wckyWatsonbot" target="_blank" rel="noopener" style="color:#c9a84c;display:flex;align-items:center;flex-shrink:0;text-decoration:none">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </a>
  <div id="hdr-date"></div>
</header>

<div id="page-content"><div class="loading">Loading&hellip;</div></div>

<!-- Add-task bar (shown only on Tasks page) -->
<div id="add-task-bar">
  <input id="add-task-input" type="text" placeholder="New task&hellip;" autocomplete="off">
  <button id="add-task-btn" onclick="addTask()">Submit</button>
</div>

<nav id="nav">
  <button class="nb active" id="nav-home"      onclick="switchTab('home')">
    <span class="ni"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></span>
    <span class="nl">Home</span>
  </button>
  <button class="nb" id="nav-briefing" onclick="switchTab('briefing')">
    <span class="ni"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg></span>
    <span class="nl">Briefing</span>
  </button>
  <button class="nb" id="nav-tasks" onclick="switchTab('tasks')">
    <span class="ni"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>
    <span class="nl">Tasks</span>
  </button>
  <button class="nb" id="nav-reminders" onclick="switchTab('reminders')">
    <span class="ni"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span>
    <span class="nl">Reminders</span>
  </button>
  <button class="nb" id="nav-more" onclick="switchTab('more')">
    <span class="ni"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg></span>
    <span class="nl">More</span>
  </button>
  <button class="nb" id="nav-chat" onclick="switchTab('chat')">
    <span class="ni"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
    <span class="nl">Chat</span>
  </button>
</nav>

<div id="tab-chat">
  <div id="chat-topbar">
    <button id="chat-back-btn" onclick="closeChat()" aria-label="Back">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span id="chat-topbar-label">Dashboard</span>
  </div>
  <div id="chat-messages"></div>
  <div id="chat-input-bar">
    <textarea id="chat-textarea" placeholder="Message Watson…" rows="1"></textarea>
    <button id="chat-send-btn" onclick="sendChatStream()" aria-label="Send">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
    </button>
  </div>
</div>

<div id="logins-overlay">
  <div id="logins-topbar">
    <button id="logins-back-btn" onclick="closeLogins()" aria-label="Back">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span id="logins-topbar-label">Logins</span>
    <button id="logins-add-btn" onclick="loginsShowForm()" aria-label="Add login" style="display:none">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
  <div id="logins-body">

    <!-- State: Locked -->
    <div id="logins-state-locked" style="display:none">
      <div class="logins-locked-screen">
        <div class="logins-locked-icon">🔒</div>
        <div class="logins-locked-msg">Vault Locked<br>Unlock via Telegram to access your logins.</div>
      </div>
    </div>

    <!-- State: Challenge -->
    <div id="logins-state-challenge" style="display:none">
      <div class="logins-challenge-screen">
        <div class="logins-challenge-label">Challenge</div>
        <div class="logins-challenge-word" id="logins-challenge-word">&hellip;</div>
        <div class="logins-challenge-label" style="font-size:10px;margin-top:-4px">Enter the response</div>
        <input id="logins-challenge-input" class="logins-challenge-input" type="text"
               placeholder="Response" autocomplete="off" autocorrect="off" autocapitalize="off"
               onkeydown="if(event.key==='Enter')loginsSubmitChallenge()">
        <div class="logins-challenge-err" id="logins-challenge-err"></div>
        <div class="logins-challenge-btns">
          <button class="mbtn mbtn-p" onclick="loginsSubmitChallenge()">Verify</button>
          <button class="mbtn"        onclick="loginsSkipChallenge()">Skip</button>
        </div>
      </div>
    </div>

    <!-- State: List -->
    <div id="logins-state-list" style="display:none;padding:14px 0 20px">
      <input id="logins-search" class="logins-search" type="search"
             placeholder="Search logins…" autocomplete="off" autocorrect="off"
             oninput="_loginsFilterAndRender()">
      <!-- Add / Edit form -->
      <div id="logins-add-panel" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:14px;margin:0 0 12px">
        <div id="logins-form-title" style="font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Add Login</div>
        <input id="login-inp-label"    type="text"     placeholder="Label (e.g. Netflix) *" autocomplete="off">
        <input id="login-inp-user"     type="text"     placeholder="Username / email"       autocomplete="off">
        <input id="login-inp-pass"     type="password" placeholder="Password"               autocomplete="new-password">
        <input id="login-inp-url"      type="url"      placeholder="URL (optional)"         autocomplete="off">
        <textarea id="login-inp-notes" rows="2"        placeholder="Notes (optional)"></textarea>
        <div class="logins-form-row">
          <button class="mbtn mbtn-p" onclick="loginsSave()">Save</button>
          <button class="mbtn"        onclick="_loginsHideForm()">Cancel</button>
        </div>
      </div>
      <!-- Login rows -->
      <div id="logins-list"></div>
    </div>

  </div>
</div>

<script src="{{ url_for('serve_appjs') }}?v={{ app_js_ts }}"></script>
</body>
</html>
