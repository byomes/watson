<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Watson">
<meta name="theme-color" content="#0f0f0f">
<title>Watson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ───────────────────────────────────────────────────────── */
:root {
  --bg:       #0f0f0f;
  --surface:  #1a1a1a;
  --border:   #2a2a2a;
  --gold:     #c9a84c;
  --gold-dim: #8a6f2e;
  --muted:    #666;
  --green:    #4caf7d;
  --red:      #c9504c;
  --blue:     #4c7ec9;
  --text:     #e8e8e8;
  --r-card:   12px;
  --r-btn:    6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', -apple-system, sans-serif;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* ── Header ─────────────────────────────────────────────────────────────── */
#hdr {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  height: 57px;
}

#hdr-mark {
  width: 36px; height: 36px;
  background: #111827;
  border-radius: 8px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: Georgia, serif;
  font-size: 22px; font-weight: 700;
  color: var(--gold); line-height: 1;
}

#hdr-text { flex: 1; min-width: 0; }
#hdr-title { font-size: 14px; font-weight: 600; color: var(--gold); letter-spacing: .05em; }
#hdr-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
#hdr-date { font-size: 11px; color: var(--muted); flex-shrink: 0; text-align: right; white-space: nowrap; }

/* ── Scrollable page area ────────────────────────────────────────────────── */
#page-content {
  position: fixed;
  top: 57px; left: 0; right: 0;
  bottom: calc(60px + env(safe-area-inset-bottom));
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
}

/* Extra bottom padding on tasks page for sticky add bar */
#page-content.has-add-bar {
  padding-bottom: 68px;
}

/* ── Add-task bar (tasks page only) ─────────────────────────────────────── */
#add-task-bar {
  display: none;
  position: fixed;
  left: 0; right: 0;
  bottom: calc(60px + env(safe-area-inset-bottom));
  z-index: 90;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  gap: 8px;
  align-items: center;
}
#add-task-bar.visible { display: flex; }

#add-task-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-btn);
  padding: 9px 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  min-width: 0;
}
#add-task-input:focus { border-color: var(--gold); }
#add-task-input::placeholder { color: var(--muted); }

#add-task-btn {
  background: var(--gold);
  color: #0f0f0f;
  border: none;
  border-radius: var(--r-btn);
  padding: 9px 18px;
  font-weight: 600;
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
#add-task-btn:active { opacity: .8; }

/* ── Bottom nav ──────────────────────────────────────────────────────────── */
#nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  height: 60px;
  padding-bottom: env(safe-area-inset-bottom);
}
.nb {
  flex: 1;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  font-family: inherit;
  color: var(--muted);
  transition: color .15s;
  -webkit-tap-highlight-color: transparent;
}
.nb .ni { font-size: 20px; line-height: 1; }
.nb .nl { font-size: 10px; letter-spacing: .03em; }
.nb.active { color: var(--gold); }

/* ── Section labels ──────────────────────────────────────────────────────── */
.sec-label {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  letter-spacing: .1em;
  color: var(--muted);
  text-transform: uppercase;
  margin: 20px 0 8px;
}
.sec-label:first-child { margin-top: 0; }

/* ── Base card ───────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: 14px;
  margin-bottom: 8px;
}
.card-title { font-size: 14px; font-weight: 500; line-height: 1.4; }
.card-sub   { font-size: 12px; color: var(--muted); margin-top: 3px; }

/* ── Type badges (pending) ───────────────────────────────────────────────── */
.badge {
  display: inline-block;
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  padding: 2px 7px;
  border-radius: 4px;
  margin-top: 6px;
  font-weight: 500;
  letter-spacing: .04em;
}
.badge-EMAIL    { background: rgba(201,168,76,.12);  color: var(--gold);  border: 1px solid rgba(201,168,76,.3); }
.badge-NOTE     { background: rgba(76,126,201,.12);  color: var(--blue);  border: 1px solid rgba(76,126,201,.3); }
.badge-CALENDAR { background: rgba(76,175,125,.12);  color: var(--green); border: 1px solid rgba(76,175,125,.3); }

/* ── Stats row ───────────────────────────────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: 14px 10px;
  text-align: center;
}
.stat-num { font-size: 30px; font-weight: 600; color: var(--gold); line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── Task / reminder cards ───────────────────────────────────────────────── */
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: 12px 14px;
  margin-bottom: 6px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.task-check {
  width: 18px; height: 18px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.task-check:hover { border-color: var(--gold); }
.task-check.is-done {
  background: var(--green);
  border-color: var(--green);
}
.task-check.is-done::after {
  content: '';
  position: absolute;
  left: 4px; top: 2px;
  width: 7px; height: 4px;
  border-left: 2px solid #fff;
  border-bottom: 2px solid #fff;
  transform: rotate(-45deg);
}
.task-check.display-only { cursor: default; }
.task-body  { flex: 1; min-width: 0; }
.task-title { font-size: 14px; line-height: 1.4; }
.task-title.struck { color: var(--muted); text-decoration: line-through; }

.pri {
  display: inline-block;
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  padding: 2px 6px;
  border-radius: 4px;
  margin-top: 5px;
  letter-spacing: .02em;
}
.pri-high   { background: rgba(201,80,76,.12);  color: var(--red); }
.pri-medium { background: rgba(201,168,76,.10); color: var(--gold-dim); }
.pri-low    { background: rgba(76,175,125,.10); color: var(--green); }
.pri-normal { background: rgba(102,102,102,.10);color: var(--muted); }

/* ── Calendar grouped card ───────────────────────────────────────────────── */
.cal-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  overflow: hidden;
  margin-bottom: 8px;
}
.cal-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.cal-row:last-child { border-bottom: none; }
.cal-time  { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); flex-shrink: 0; width: 62px; }
.cal-event { font-size: 14px; font-weight: 500; flex: 1; }

/* ── Briefing ────────────────────────────────────────────────────────────── */
.b-hdr {
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.b-hdr-title { font-size: 22px; font-weight: 600; color: var(--gold); letter-spacing: .06em; }
.b-hdr-date  { font-size: 12px; color: var(--muted); margin-top: 4px; }
.b-hdr-gen   { font-size: 11px; color: var(--muted); opacity: .6; margin-top: 2px; font-family: 'DM Mono', monospace; }

.b-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: 14px;
  margin-bottom: 10px;
}
.b-source  { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
.b-title   { font-size: 14px; font-weight: 500; line-height: 1.4; margin-bottom: 10px; }
.b-actions { display: flex; flex-wrap: wrap; gap: 6px; }

.b-btn {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: var(--r-btn);
  border: 1px solid var(--border);
  background: none;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  transition: opacity .15s;
}
.b-btn:active { opacity: .7; }
.b-btn-read   { border-color: var(--gold); color: var(--gold); }
.b-btn-reject { border-color: var(--red);  color: var(--red);  }
.b-btn.sent   { opacity: .4; pointer-events: none; }

/* ── Reading list card ────────────────────────────────────────────────────── */
.rl-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: 14px;
  margin-bottom: 8px;
}
.rl-source { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
.rl-title  { font-size: 14px; font-weight: 500; line-height: 1.4; }
.rl-status { font-size: 10px; font-family: 'DM Mono', monospace; margin-top: 6px; }
.rl-unread  { color: var(--muted); }
.rl-reading { color: var(--gold); }
.rl-finished{ color: var(--green); }

/* ── View-all link ───────────────────────────────────────────────────────── */
.view-all {
  display: block;
  text-align: center;
  padding: 10px;
  font-size: 12px;
  color: var(--gold);
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  letter-spacing: .04em;
  -webkit-tap-highlight-color: transparent;
}

/* ── Empty / loading states ──────────────────────────────────────────────── */
.empty   { text-align: center; color: var(--muted); font-size: 13px; padding: 24px 0; }
.loading { text-align: center; color: var(--muted); font-size: 12px; padding: 20px 0; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>

<header id="hdr">
  <div id="hdr-mark">W</div>
  <div id="hdr-text">
    <div id="hdr-title">WATSON</div>
    <div id="hdr-sub">Digital Assistant</div>
  </div>
  <div id="hdr-date"></div>
</header>

<div id="page-content"><div class="loading">Loading&hellip;</div></div>

<!-- Add-task bar (shown only on Tasks page) -->
<div id="add-task-bar">
  <input id="add-task-input" type="text" placeholder="New task&hellip;" autocomplete="off">
  <button id="add-task-btn" onclick="addTask()">Submit</button>
</div>

<nav id="nav">
  <button class="nb active" id="nav-home"      onclick="switchTab('home')">     <span class="ni">⌂</span><span class="nl">Home</span></button>
  <button class="nb"        id="nav-briefing"  onclick="switchTab('briefing')"> <span class="ni">☀</span><span class="nl">Briefing</span></button>
  <button class="nb"        id="nav-tasks"     onclick="switchTab('tasks')">    <span class="ni">✓</span><span class="nl">Tasks</span></button>
  <button class="nb"        id="nav-reminders" onclick="switchTab('reminders')"><span class="ni">◎</span><span class="nl">Reminders</span></button>
  <button class="nb"        id="nav-reading"   onclick="switchTab('reading')">  <span class="ni">☰</span><span class="nl">Reading</span></button>
</nav>

<script src="{{ url_for('serve_appjs') }}?v={{ app_js_ts }}"></script>
</body>
</html>
